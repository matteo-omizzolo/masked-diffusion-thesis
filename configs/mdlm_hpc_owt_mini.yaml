# ============================================
# Mini Baseline Config: MDLM (no ReMDM)
# ============================================
# Purpose: Baseline comparison for ReMDM strategies
# Strategy: mdlm (standard MDLM sampling, no remasking)
# Expected runtime: ~1 min on RTX 2080 Ti
#
# Usage:
#   sbatch slurm/remdm_smoke.sbatch configs/mdlm_hpc_owt_mini.yaml
# ============================================

project_name: mdlm-hpc-owt-mini-baseline
seed: 42

paths:
  logs_dir: logs
  results_dir: results

remdm:
  toy_mode: false
  dry_run: false

  mode: sample_eval
  seed: 1

  data: openwebtext-streaming
  model_size: small
  backbone: hf_dit
  parameterization: subs
  sequence_length: 1024

  upstream_checkpoint_path: kuleshov-group/mdlm-no_flashattn-fp32-owt

  T: 0
  time_conditioning: false

  steps: 64
  strategy: mdlm                # BASELINE: standard MDLM sampling
  nucleus_p: 0.9
  num_sample_batches: 2

  batch_size: 1
  eval_batch_size: 1
  perplexity_batch_size: 1

  generated_seqs_path: null
  wandb_offline: true

  precision: 32

  env_patch: true
  require_optional_backbones: false
