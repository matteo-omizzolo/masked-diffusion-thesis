# ReMDM run config
# 
# Usage modes (edit toy_mode and dry_run flags):
# 1. Toy mode (testing):        toy_mode=true  dry_run=any     → mock sampling
# 2. Dry run (macOS dev):       toy_mode=false dry_run=true    → print command only
# 3. Real mode (Linux HPC):     toy_mode=false dry_run=false   → actual execution
#
project_name: masked-diffusion-thesis
seed: 42
deterministic: false

paths:
  logs_dir: logs
  results_dir: results

model:
  base_checkpoint_path: null
  device: cpu               # Use "cuda" on Linux HPC

remdm:
  # ============================================================================
  # Execution mode
  # ============================================================================
  toy_mode: true            # true = mock sampling | false = real ReMDM
  dry_run: true             # true = print command only (macOS safe) | false = execute
  
  # ============================================================================
  # Upstream ReMDM parameters (used when toy_mode=false)
  # Verified against external/remdm/scripts/remdm-conf.sh and remdm-loop.sh
  # ============================================================================
  
  # Basic config
  mode: sample_eval         # train | ppl_eval | sample_eval
  seed: 1                   # Random seed for upstream
  
  # Data & model architecture (must match checkpoint)
  data: openwebtext-split   # openwebtext-split | openwebtext | text8 | etc.
  model_size: small         # small | medium | tiny | small-ar | tiny-ar | tiny-dimamba
  backbone: dit             # dit | dimamba | ar
  parameterization: subs    # subs | d3pm | sedd
  sequence_length: 1024     # model.length (default from model config)
  
  # Checkpoint
  upstream_checkpoint_path: null     # TODO: Set to /path/to/remdm_checkpoint.ckpt on HPC
  
  # Time parameterization
  T: 0                      # 0 = continuous time | 1000 = discrete time
  time_conditioning: false  # Whether to use time conditioning
  
  # Sampling parameters
  steps: 1024               # sampling.steps (number of diffusion steps)
  strategy: remdm-conf      # sampling.sampler: remdm-conf | remdm-loop | mdlm | etc.
  nucleus_p: 0.9            # sampling.nucleus_p (top-p sampling, 0.0-1.0)
  num_sample_batches: 5000  # sampling.num_sample_batches
  
  # Batch sizes (per device)
  batch_size: 1             # loader.batch_size
  eval_batch_size: 1        # loader.eval_batch_size
  perplexity_batch_size: 1  # eval.perplexity_batch_size
  
  # Output paths
  generated_seqs_path: null # sampling.generated_seqs_path (null = auto-generate)
  output_dir: null          # hydra.run.dir (null = auto-create)
  
  # Wandb
  wandb_offline: true       # +wandb.offline=true (avoid wandb errors)
  
  # ============================================================================
  # Strategy-specific parameters (optional)
  # ============================================================================
  
  # For remdm-loop strategy (ignored for other strategies)
  eta: 0.02                 # sampling.eta
  t_on: 0.55                # sampling.t_on
  t_off: 0.05               # sampling.t_off
  alpha_on: 0.9             # sampling.alpha_on
  
  # ============================================================================
  # Advanced (optional)
  # ============================================================================
  upstream_config: null     # Upstream base config name (null = use CLI overrides only)
  extra_overrides: []       # Additional Hydra overrides: ["key=value", ...]
