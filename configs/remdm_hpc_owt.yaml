project_name: remdm-hpc-owt
seed: 42

paths:
  logs_dir: logs
  results_dir: results

remdm:
  toy_mode: false
  dry_run: false

  mode: sample_eval
  seed: 1

  data: openwebtext-streaming  # Streaming mode avoids loading full 16GB dataset
  model_size: small
  backbone: hf_dit
  parameterization: subs
  sequence_length: 1024

  upstream_checkpoint_path: kuleshov-group/mdlm-no_flashattn-fp32-owt 

  T: 0
  time_conditioning: false

  steps: 256  # Full sampling steps for production
  strategy: remdm-rescale
  nucleus_p: 0.9
  num_sample_batches: 100  # Production scale

  batch_size: 1
  eval_batch_size: 1
  perplexity_batch_size: 1

  generated_seqs_path: null
  wandb_offline: true

  precision: 32

  # HPC environment setup
  env_patch: true
  require_optional_backbones: false
