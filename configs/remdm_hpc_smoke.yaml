project_name: remdm-hpc-smoke
seed: 42

paths:
  logs_dir: logs
  results_dir: results

remdm:
  toy_mode: false
  dry_run: false

  mode: sample_eval
  seed: 1

  data: openwebtext-split
  model_size: small
  backbone: hf_dit
  parameterization: subs
  sequence_length: 1024

  upstream_checkpoint_path: kuleshov-group/mdlm-no_flashattn-fp32-owt 

  T: 0
  time_conditioning: false

  steps: 64
  strategy: remdm-conf
  nucleus_p: 0.9
  num_sample_batches: 2

  batch_size: 1
  eval_batch_size: 1
  perplexity_batch_size: 1

  generated_seqs_path: null
  wandb_offline: true

  # HPC environment setup
  env_patch: true  # Set runtime env vars (TMPDIR, HF_HOME, etc.)
  require_optional_backbones: false  # Set to true only if using dimamba backbone
